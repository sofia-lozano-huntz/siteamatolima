<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amato Lima</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Helvetica Neue', sans-serif;
    }

    body {
      overflow-x: hidden;
      background: #000;
      color: white;
    }

    /* HEADER */
    header {
      position: fixed;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 30px;
      z-index: 10;
      opacity: 0;
      transform: translateY(-10px);
      animation: fadeHeader 1.2s ease forwards;
    }

    @keyframes fadeHeader {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    header img {
      height: 28px;
    }

    /* MENU ICON */
    .menu-btn {
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .menu-btn span {
      width: 24px;
      height: 1px;
      background: white;
      display: block;
    }

    /* HERO */
    .hero {
      position: relative;
      height: 100vh;
      overflow: hidden;
    }

    .hero video {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1.05);
    }

    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.2);
      transition: 0.4s ease;
    }

    /* FRASE */
    .signature {
      position: absolute;
      bottom: 40px;
      right: 40px;
      font-size: 12px;
      letter-spacing: 2px;
      opacity: 0;
      animation: fadeText 2s ease forwards;
      animation-delay: 1.5s;
    }

    @keyframes fadeText {
      to { opacity: 0.6; }
    }

    /* MENU FULLSCREEN */
    .menu {
      position: fixed;
      width: 100%;
      height: 100vh;
      backdrop-filter: blur(12px);
      background: rgba(60, 45, 35, 0.75);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      transform: translateY(-100%);
      transition: 0.6s cubic-bezier(.77,0,.18,1);
      z-index: 20;
    }

    .menu.active {
      transform: translateY(0);
    }

    .menu a {
      color: white;
      text-decoration: none;
      font-size: 32px;
      margin: 20px 0;
      letter-spacing: 3px;
      opacity: 0;
      transform: translateY(20px);
      transition: 0.4s;
    }

    .menu.active a {
      opacity: 1;
      transform: translateY(0);
    }

    /* CLOSE BUTTON */
    .close {
      position: absolute;
      top: 30px;
      right: 30px;
      cursor: pointer;
      font-size: 18px;
    }

    /* TRANSIÇÃO SCROLL */
    .content {
      height: 100vh;
      background: #f5f2ed;
    }

  </style>
</head>

<body>

<header>
 <img src="image/logo.jpeg" alt="logo">

  <div class="menu-btn" onclick="openMenu()">
    <span></span>
    <span></span>
  </div>
</header>

<!-- MENU -->
<div class="menu" id="menu">
  <div class="close" onclick="closeMenu()">✕</div>

  <a href="index.html">HOME</a>
  <a href="projetos.html">PROJETOS</a>
  <a href="sobre.html">SOBRE</a>
  <a href="contato.html">CONTATO</a>
</div>

<!-- HERO -->
<section class="hero">
  <video autoplay muted loop playsinline>
    <source src="image/video-hero.mp4" type="video/mp4">
  </video>

  <div class="overlay" id="overlay"></div>

  <div class="signature">Forma, luz e matéria</div>
</section>

<div class="content"></div>

<script>
  function openMenu() {
    document.getElementById("menu").classList.add("active");
  }

  function closeMenu() {
    document.getElementById("menu").classList.remove("active");
  }

  window.addEventListener("scroll", () => {
    let scroll = window.scrollY;
    document.getElementById("overlay").style.background =
      "rgba(0,0,0," + (0.2 + scroll / 1200) + ")";
  });
</script>

</body>
</html>
