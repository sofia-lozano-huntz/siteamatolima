<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amato Lima</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --warm-white: #f6f1eb;
      --champagne: #C1A78F;
      --line: rgba(255, 255, 255, 0.2);
      --menu-bg: rgba(42, 30, 23, 0.72);
      --overlay-dark: rgba(20, 15, 12, 0.34);
      --overlay-grad-top: rgba(20, 15, 12, 0.14);
      --overlay-grad-bottom: rgba(20, 15, 12, 0.48);
    }

    body {
      overflow-x: hidden;
      background: #000;
      color: var(--warm-white);
      font-family: Georgia, "Times New Roman", serif;
    }

    .hero {
      position: relative;
      height: 96vh;
      width: 100%;
      overflow: hidden;
    }

    /* VÍDEO */
    .hero video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1.03);
      animation: slowZoom 18s ease-in-out infinite alternate;
      filter: saturate(0.92) contrast(1.02);
    }

    @keyframes slowZoom {
      from {
        transform: scale(1.03);
      }
      to {
        transform: scale(1.07);
      }
    }

    /* CAMADAS */
    .overlay-dark {
      position: absolute;
      inset: 0;
      background: var(--overlay-dark);
      z-index: 1;
    }

    .overlay-gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        var(--overlay-grad-top),
        var(--overlay-grad-bottom)
      );
      z-index: 2;
    }

    /* HEADER */
    header {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      padding: 28px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }

    .brand-left {
      display: flex;
      align-items: center;
      gap: 10px;
      opacity: 0;
      filter: blur(8px);
      transform: translateY(-4px);
      animation: revealBrand 0.6s ease forwards;
    }

    @keyframes revealBrand {
      to {
        opacity: 1;
        filter: blur(0);
        transform: translateY(0);
      }
    }

    .brand-left img {
      height: 22px;
      width: auto;
      display: block;
    }

    .brand-left span {
      font-size: 14px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      font-weight: 400;
      line-height: 1;
      color: var(--champagne);
      background: linear-gradient(
        180deg,
        #d4baa0 0%,
        #c1a78f 38%,
        #b49373 68%,
        #dbc7b2 100%
      );
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative;
      text-shadow:
        0 0 1px rgba(255,255,255,0.06),
        0 0 14px rgba(193,167,143,0.05);
    }

    /* ruído sutil visual */
    .brand-left span::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(rgba(255,255,255,0.08) 0.5px, transparent 0.5px);
      background-size: 6px 6px;
      opacity: 0.08;
      mix-blend-mode: screen;
      pointer-events: none;
    }

    /* MENU ICON */
    .menu-btn {
      display: flex;
      flex-direction: column;
      gap: 7px;
      cursor: pointer;
      width: 30px;
      align-items: flex-end;
      z-index: 11;
    }

    .menu-btn span {
      display: block;
      height: 1px;
      background: var(--warm-white);
      transition: 0.35s ease;
      box-shadow: 0 0 0 rgba(193,167,143,0);
    }

    .menu-btn span:first-child {
      width: 30px;
    }

    .menu-btn span:last-child {
      width: 21px;
    }

    .menu-btn:hover span {
      background: var(--champagne);
      box-shadow: 0 0 10px rgba(193,167,143,0.22);
    }

    /* LINHAS */
    .top-line {
      position: absolute;
      top: 92px;
      left: 0;
      width: 100%;
      height: 1px;
      background: var(--line);
      z-index: 9;
    }

    .vertical-line {
      position: absolute;
      top: 0;
      left: 50%;
      width: 1px;
      height: 100%;
      background: rgba(255,255,255,0.08);
      z-index: 3;
      transform: translateX(-50%);
    }

    /* FRASE CENTRAL */
    .center-title {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -52%);
      z-index: 8;
      text-align: center;
      width: 100%;
      padding: 0 24px;
    }

    .center-title h1 {
      font-size: clamp(3.2rem, 7vw, 7rem);
      font-weight: 300;
      letter-spacing: 0.1em;
      line-height: 0.95;
      color: var(--warm-white);
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(18px);
      filter: blur(6px);
      animation: revealTitle 0.9s ease forwards;
      animation-delay: 0.22s;
      text-shadow: 0 8px 30px rgba(0,0,0,0.18);
    }

    @keyframes revealTitle {
      to {
        opacity: 1;
        transform: translateY(0);
        filter: blur(0);
      }
    }

    /* MENU FULLSCREEN */
    .menu-panel {
      position: fixed;
      inset: 0;
      background: var(--menu-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.45s ease, visibility 0.45s ease;
    }

    .menu-panel.active {
      opacity: 1;
      visibility: visible;
    }

    .menu-close {
      position: absolute;
      top: 28px;
      right: 40px;
      font-size: 28px;
      color: var(--warm-white);
      cursor: pointer;
      transition: 0.3s ease;
    }

    .menu-close:hover {
      color: var(--champagne);
      text-shadow: 0 0 10px rgba(193,167,143,0.18);
    }

    .menu-links {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      text-align: center;
    }

    .menu-links a {
      color: var(--warm-white);
      text-decoration: none;
      font-size: clamp(2rem, 4vw, 3.4rem);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 300;
      transition: 0.3s ease;
    }

    .menu-links a:hover {
      color: var(--champagne);
      text-shadow: 0 0 14px rgba(193,167,143,0.16);
    }

    @media (max-width: 768px) {
      .hero {
        height: 94vh;
      }

      header {
        padding: 22px 20px;
      }

      .brand-left {
        gap: 8px;
      }

      .brand-left img {
        height: 18px;
      }

      .brand-left span {
        font-size: 11px;
        letter-spacing: 0.2em;
      }

      .top-line {
        top: 78px;
      }

      .center-title h1 {
        font-size: clamp(2.4rem, 12vw, 4rem);
        letter-spacing: 0.08em;
      }

      .menu-close {
        top: 18px;
        right: 20px;
      }
    }
  </style>
</head>
<body>

  <section class="hero">
    <video autoplay muted loop playsinline>
      <source src="image/video-hero.mp4" type="video/mp4">
    </video>

    <div class="overlay-dark"></div>
    <div class="overlay-gradient"></div>

    <header>
      <div class="brand-left">
        <img src="image/logo.png" alt="logo">
        <span>Amato Lima</span>
      </div>

      <div class="menu-btn" aria-label="Abrir menu" onclick="openMenu()">
        <span></span>
        <span></span>
      </div>
    </header>

    <div class="top-line"></div>
    <div class="vertical-line"></div>

    <div class="center-title">
      <h1>Frase</h1>
    </div>
  </section>

  <div class="menu-panel" id="menuPanel">
    <div class="menu-close" onclick="closeMenu()">✕</div>

    <nav class="menu-links">
      <a href="index.html">Home</a>
      <a href="projetos.html">Projetos</a>
      <a href="sobre.html">Sobre</a>
      <a href="contato.html">Contato</a>
    </nav>
  </div>

  <script>
    const menuPanel = document.getElementById("menuPanel");

    function openMenu() {
      menuPanel.classList.add("active");
      document.body.style.overflow = "hidden";
    }

    function closeMenu() {
      menuPanel.classList.remove("active");
      document.body.style.overflow = "";
    }

    document.addEventListener("keydown", function(event) {
      if (event.key === "Escape") {
        closeMenu();
      }
    });
  </script>

</body>
</html>
