<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amato Lima</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Times New Roman", serif;
    }

    body {
      overflow-x: hidden;
      background: #000;
      color: white;
    }

    /* HERO */
    .hero {
      position: relative;
      height: 85vh;
      width: 100%;
      overflow: hidden;
    }

    /* VIDEO */
    .hero video {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1.05);
    }

    /* OVERLAY */
    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.35);
    }

    /* HEADER */
    header {
      position: absolute;
      top: 0;
      width: 100%;
      padding: 25px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
      font-size: 12px;
      letter-spacing: 2px;
    }

    /* TOP LINE */
    .top-line {
      position: absolute;
      top: 70px;
      width: 100%;
      height: 1px;
      background: rgba(255,255,255,0.2);
    }

    /* MENU LEFT */
    .menu-left {
      cursor: pointer;
    }

    /* MENU RIGHT */
    .menu-right {
      display: flex;
      gap: 30px;
    }

    /* CENTER TITLE (top small) */
    .brand-top {
      position: absolute;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      letter-spacing: 4px;
    }

    /* MAIN TITLE */
    .title {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 80px;
      letter-spacing: 3px;
      text-align: center;
      font-weight: 400;
    }

    /* BOTTOM TEXT */
    .bottom-text {
      position: absolute;
      bottom: 20px;
      width: 100%;
      text-align: center;
      font-size: 12px;
      opacity: 0.7;
      padding: 0 40px;
    }

    @media (max-width: 768px) {
      .title {
        font-size: 36px;
      }

      header {
        padding: 20px;
      }

      .menu-right {
        display: none;
      }
    }

  </style>
</head>

<body>

<section class="hero">

  <!-- VIDEO -->
  <video autoplay muted loop playsinline>
    <source src="image/video-hero.mp4" type="video/mp4">
  </video>

  <!-- OVERLAY -->
  <div class="overlay"></div>

  <!-- HEADER -->
  <header>
    <div class="menu-left">MENU</div>

    <div class="menu-right">
      <div>PROJETOS</div>
      <div>CONTATO</div>
    </div>
  </header>

  <!-- BRAND TOP -->
  <div class="brand-top">AMATO LIMA</div>

  <!-- LINE -->
  <div class="top-line"></div>

  <!-- MAIN TITLE -->
  <div class="title">
    AMATO LIMA
  </div>

  <!-- BOTTOM TEXT -->
  <div class="bottom-text">
    Ativos imobiliários
  </div>

</section>

</body>
</html>
