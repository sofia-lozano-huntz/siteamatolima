<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amato Lima</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow-x: hidden;
      background: #161412;
      color: #F3EEE8;
      font-family: serif;
    }

    /* HEADER */
    header {
      position: fixed;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 30px 40px;
      z-index: 10;
      opacity: 0;
      transform: translateY(-10px);
      animation: fadeHeader 1.2s ease forwards;
    }

    @keyframes fadeHeader {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand img {
      height: 28px;
    }

    .brand-name {
      font-size: 16px;
      letter-spacing: 3px;
      position: relative;
      overflow: hidden;
    }

    /* efeito de luz */
    .brand-name::after {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        120deg,
        transparent,
        rgba(193,167,143,0.6),
        transparent
      );
      animation: shine 4s infinite;
    }

    @keyframes shine {
      0% { left: -100%; }
      50% { left: 100%; }
      100% { left: 100%; }
    }

    /* MENU ICON */
    .menu-btn {
      display: flex;
      flex-direction: column;
      gap: 6px;
      cursor: pointer;
    }

    .menu-btn span {
      width: 22px;
      height: 1px;
      background: #F3EEE8;
    }

    /* HERO */
    .hero {
      position: relative;
      height: 100vh;
      overflow: hidden;
    }

    .hero video {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1.05);
    }

    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(22,20,18,0.25);
      transition: 0.4s ease;
    }

    /* FRASE */
    .signature {
      position: absolute;
      bottom: 40px;
      right: 40px;
      font-size: 12px;
      letter-spacing: 2px;
      color: #F3EEE8;
      opacity: 0;
      animation: fadeText 2s ease forwards;
      animation-delay: 1.5s;
    }

    @keyframes fadeText {
      to { opacity: 0.6; }
    }

    /* MENU */
    .menu {
      position: fixed;
      width: 100%;
      height: 100vh;
      backdrop-filter: blur(12px);
      background: rgba(47,30,23,0.8);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      transform: translateY(-100%);
      transition: 0.6s cubic-bezier(.77,0,.18,1);
      z-index: 20;
    }

    .menu.active {
      transform: translateY(0);
    }

    .menu a {
      color: #F3EEE8;
      text-decoration: none;
      font-size: 32px;
      margin: 20px 0;
      letter-spacing: 3px;
      transition: 0.3s;
    }

    .menu a:hover {
      color: #C1A78F;
    }

    .close {
      position: absolute;
      top: 30px;
      right: 30px;
      cursor: pointer;
      font-size: 20px;
      color: #F3EEE8;
    }

  </style>
</head>

<body>

<header>
  <div class="brand">
    <img src="image/logo.png" alt="logo">
    <div class="brand-name">AMATO LIMA</div>
  </div>

  <div class="menu-btn" onclick="openMenu()">
    <span></span>
    <span></span>
  </div>
</header>

<div class="menu" id="menu">
  <div class="close" onclick="closeMenu()">✕</div>

  <a href="#">HOME</a>
  <a href="#">PROJETOS</a>
  <a href="#">SOBRE</a>
  <a href="#">CONTATO</a>
</div>

<section class="hero">
  <video autoplay muted loop playsinline>
    <source src="image/video-hero.mp4" type="video/mp4">
  </video>

  <div class="overlay" id="overlay"></div>

  <div class="signature">Forma, luz e matéria</div>
</section>

<script>
  function openMenu() {
    document.getElementById("menu").classList.add("active");
  }

  function closeMenu() {
    document.getElementById("menu").classList.remove("active");
  }

  window.addEventListener("scroll", () => {
    let scroll = window.scrollY;
    document.getElementById("overlay").style.background =
      "rgba(22,20,18," + (0.25 + scroll / 1200) + ")";
  });
</script>

</body>
</html>
