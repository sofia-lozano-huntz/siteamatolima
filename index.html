<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amato Lima</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow-x: hidden;
      background: #000;
      color: #f6f1eb;
      font-family: Georgia, "Times New Roman", serif;
    }

    .hero {
      position: relative;
      height: 97vh;
      width: 100%;
      overflow: hidden;
    }

    .hero video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1.03);
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.36);
    }

    header {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      padding: 28px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }

    .brand-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-left img {
      height: 50px;
      width: auto;
      display: block;
    }

    .brand-left span {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 14px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #f6f1eb;
      font-weight: 400;
      line-height: 1;
    }

    .menu-btn {
      display: flex;
      flex-direction: column;
      gap: 7px;
      cursor: pointer;
      width: 28px;
      align-items: flex-end;
    }

    .menu-btn span {
      display: block;
      height: 1px;
      background: #f6f1eb;
      transition: 0.3s ease;
    }

    .menu-btn span:first-child {
      width: 28px;
    }

    .menu-btn span:last-child {
      width: 20px;
    }

    .menu-btn:hover span {
      background: #c1a78f;
    }

    .top-line {
      position: absolute;
      top: 92px;
      left: 0;
      width: 100%;
      height: 1px;
      background: rgba(255, 255, 255, 0.16);
      z-index: 9;
    }

    .center-title {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -52%);
      z-index: 8;
      text-align: center;
      width: 100%;
      padding: 0 24px;
    }

    .center-title h1 {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(3.2rem, 7vw, 7rem);
      font-weight: 300;
      letter-spacing: 0.1em;
      line-height: 0.95;
      color: #f6f1eb;
      text-transform: uppercase;
    }

    @media (max-width: 768px) {
      .hero {
        height: 82vh;
      }

      header {
        padding: 22px 20px;
      }

      .brand-left {
        gap: 8px;
      }

      .brand-left img {
        height: 14px;
      }

      .brand-left span {
        font-size: 11px;
        letter-spacing: 0.2em;
      }

      .top-line {
        top: 66px;
      }

      .center-title h1 {
        font-size: clamp(2.4rem, 12vw, 4rem);
        letter-spacing: 0.08em;
      }
    }
  </style>
</head>
<body>

  <section class="hero">
    <video autoplay muted loop playsinline>
      <source src="image/video-hero.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <header>
      <div class="brand-left">
        <img src="image/logo.png" alt="logo">
        <span>Amato Lima</span>
      </div>

      <div class="menu-btn" aria-label="Abrir menu">
        <span></span>
        <span></span>
      </div>
    </header>

    <div class="top-line"></div>

    <div class="center-title">
      <h1>Frase</h1>
    </div>
  </section>

</body>
</html>
